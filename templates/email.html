<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "https://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="color-scheme" content="light only">
<title>{{subject}}</title>
<!--[if mso]><style>* { font-family: Arial, sans-serif !important; }</style><![endif]-->
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:0;width:100%!important;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;}
  table{border-collapse:collapse;}
  img{border:0;line-height:100%;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;}
  a{text-decoration:none;}
  @media only screen and (max-width:600px){
    .card-pad{padding-left:24px!important;padding-right:24px!important;}
    .h1{font-size:24px!important;}
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:{{primaryColour}};font-family:'Open Sans',Arial,sans-serif;color:#000000;">

<div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:{{primaryColour}};">
  {{preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="{{primaryColour}}" style="background-color:{{primaryColour}};">
  <tr><td align="center" style="padding:40px 16px;">

    <!-- Card -->
    <table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0" style="width:480px;max-width:480px;background-color:#ffffff;border-radius:14px;">
      <tr><td class="card-pad" style="padding:40px 44px 0;text-align:center;">
        <img src="cid:logo" width="44" alt="{{appName}}" style="display:inline-block;margin:0 0 22px;">
        {{#emblem}}<br><img src="cid:emblem-{{.}}" width="64" height="64" alt="" style="display:inline-block;margin:0 0 22px;">{{/emblem}}
        <h1 class="h1" style="font-family:'Raleway',Arial,sans-serif;font-weight:300;font-size:27px;line-height:1.2;letter-spacing:-0.4px;color:{{chromeColour}};margin:0 0 16px;">{{title}}</h1>
      </td></tr>

      <tr><td class="card-pad" style="padding:0 44px;font-family:'Open Sans',Arial,sans-serif;">
        {{{bodyHtml}}}
      </td></tr>

      {{#button}}
      <!-- Button -->
      <tr><td align="center" style="padding:26px 44px 8px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center">
          <tr><td align="center" bgcolor="{{commitColour}}" style="border-radius:6px;">
            <a href="{{url}}" style="display:inline-block;padding:15px 40px;font-family:'Raleway',Arial,sans-serif;font-size:16px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:6px;">{{label}}</a>
          </td></tr>
        </table>
      </td></tr>
      <!-- Fallback link -->
      <tr><td class="card-pad" style="padding:24px 44px 0;font-family:'Open Sans',Arial,sans-serif;">
        <div style="border-top:1px solid #e4e9eb;padding-top:18px;">
          <p style="font-size:12px;line-height:1.6;color:#a6a6a6;margin:0 0 6px;">Button not working? Paste this into your browser:</p>
          <a href="{{url}}" style="font-size:12px;color:{{chromeColour}};word-break:break-all;">{{url}}</a>
        </div>
      </td></tr>
      {{/button}}

      <tr><td style="padding:30px 0 40px;"></td></tr>
    </table>

    <!-- Footer -->
    <table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0" style="width:480px;max-width:480px;">
      <tr><td style="padding:22px 16px 0;text-align:center;font-family:'Open Sans',Arial,sans-serif;">
        <p style="font-size:12px;line-height:1.7;color:#ffffff;margin:0;">Need a hand? <a href="mailto:{{supportEmail}}" style="color:#ffffff;font-weight:600;text-decoration:underline;">{{supportEmail}}</a> · {{appName}}</p>
      </td></tr>
    </table>

  </td></tr>
</table>
</body>
</html>
